name: agneaux_app
description: "Application pour le suivi des agneaux."
version: 1.0.0+1
environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.9.0
  audioplayers: ^5.2.1


workflows:
  ios-workflow:
    name: iOS Build
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - flutter pub get
      - flutter build ios --release --no-codesign
      - mkdir -p build/ios/ipa
      - cd build/ios/iphoneos
      - zip -r ../ipa/app.ipa Runner.app
    artifacts:
      - build/ios/ipa/*.ipa
workflows:
  ios-workflow:
    name: iOS Build
    environment:
      flutter: stable
      xcode: latest

    scripts:
      - flutter pub get
      - flutter build ios --release --no-codesign

      - mkdir -p build/ios/ipa

      # Trouver le .app généré
      - APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)

      # Créer le .ipa
      - cd $(dirname "$APP_PATH")
      - zip -r ../../ipa/app.ipa $(basename "$APP_PATH")

    artifacts:
      - build/ios/ipa/*.ipa